version: 2
project_name: ccgate
before:
  hooks:
    - go mod tidy
builds:
  - main: .
    binary: ccgate
    ldflags:
      - -s -w
      - -X main.version=v{{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
archives:
  - name_template: '{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}'
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
release:
  prerelease: auto
checksum:
  name_template: checksums.txt
changelog:
  sort: asc
  use: github
  groups:
    - title: Breaking Changes
      regexp: '^.*!:'
      order: 0
    - title: Features
      regexp: '^feat'
      order: 1
    - title: Bug Fixes
      regexp: '^fix'
      order: 2
    - title: Refactoring
      regexp: '^refactor'
      order: 3
    - title: Others
      order: 999
  filters:
    exclude:
      - '^test'
      - '^ci'
      # docs and chore are kept: breaking-change migration notes often
      # land on docs / chore commits, and dropping them silently from
      # release notes hides them from users. Maintainers should still
      # cross-check release notes against CHANGELOG.md before tagging.
