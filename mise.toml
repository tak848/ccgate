[tools]
go = "1.25.9"
"aqua:golangci/golangci-lint" = "2.5.0"

[tasks.build]
description = "Build the binary (dev use)"
run = """
VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
go build -ldflags "-s -w -X main.version=${VERSION}" -o bin/ccgate .
"""

[tasks.test]
description = "Run tests"
run = "go test -race -cover ./..."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.lint]
description = "Run go vet + golangci-lint"
depends = ["vet"]
run = "golangci-lint run ./..."

[tasks.fmt]
description = "Apply gofmt + goimports via golangci-lint"
run = "golangci-lint fmt ./..."

[tasks.cover]
description = "Generate coverage report"
run = """
go test -coverprofile=coverage.out ./...
go tool cover -html=coverage.out
"""

[tasks.clean]
description = "Clean build artifacts"
run = "rm -rf bin/ coverage.out"

[tasks.schema]
description = "Regenerate schemas/{claude,codex}.schema.json from internal/config.Config"
run = "go run ./scripts/genschema"
